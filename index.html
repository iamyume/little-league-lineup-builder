<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Little League Lineup</title>
        <link
            href="https://cdn.jsdelivr.net/npm/halfmoon@1.1.1/css/halfmoon-variables.min.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body class="with-custom-webkit-scrollbar">
        <div class="container-fluid">
            <h1 class="m-10">Lineup</h1>
            <div class="p-10">
                <div class="d-flex align-items-center">
                    <label>
                        Formation:
                        <select
                            id="formation-select"
                            class="form-control d-inline-block w-auto"
                            onchange="updateFormation()"
                        >
                            <option value="CF">Format 1 (CF)</option>
                            <option value="LCF">Format 2 (LCF/RCF)</option>
                        </select>
                    </label>
                    <button class="btn btn-primary ml-10" onclick="addPlayer()">
                        Add Player
                    </button>
                    <button
                        class="btn btn-secondary ml-10"
                        onclick="window.print()"
                    >
                        Print Lineup
                    </button>
                    <button class="btn btn-secondary ml-10" onclick="exportCSV()">
                        Export CSV
                    </button>
                    <button
                        class="btn btn-secondary ml-10"
                        onclick="document.getElementById('csv-import-input').click()"
                    >
                        Import CSV
                    </button>
                    <button class="btn btn-secondary ml-10" onclick="reversePlayers()">
                        Reverse Order
                    </button>
                    <button class="btn btn-secondary ml-10" onclick="randomizePlayers()">
                        Randomize Order
                    </button>
                    <input
                        type="file"
                        id="csv-import-input"
                        accept=".csv"
                        style="display: none;"
                        onchange="importCSV(event)"
                    />
                </div>
            </div>

            <div class="p-10 mt-10">
                <div class="table-responsive">
                    <table
                        id="lineup-grid"
                        class="table table-bordered table-striped"
                    >
                        <thead>
                            <tr id="grid-header"></tr>
                        </thead>
                        <tbody id="grid-body"></tbody>
                        <tfoot id="grid-footer"></tfoot>
                    </table>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
